<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
<form action="cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="iest">Estado:</label>
        <select name="estado" id="iest">
          
            <option value="" selected>---Escolha ---    </option>
            <optgroup>
                <option value="sp">São Paulo</option>
                <option value="rj">Rio de Janeiro</option>
                <option value="mg">Minas Gerais</option>
                <option value="es">Espírito Santo</option>
            </optgroup>
        </select>
    </p>

    <p>
        <label for="iprof">Profissão:</label>
        <input type="text" name="profissao" id="iprof" list="lstprof">
        <datalist id="lstprof">
            <option >Administrador</option>
            <option >Médico</option>
            <option >Professor</option>
            <option >Engenheiro</option>
        </datalist>
    </p>

    <p>
        <label for="imsg">Mensagem:</label>
        <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
    </p>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
